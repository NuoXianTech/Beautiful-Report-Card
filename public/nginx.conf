# ============================================================
#  Nginx 配置示例 —— 学生电子成绩查询系统（轻量 MVC 框架）
#
#  作用与 public/.htaccess（Apache）等价：把所有「非真实文件」的
#  请求统一交给唯一入口 public/index.php，再由框架路由分发。
#
#  用法（二选一）：
#   A. 裸 Nginx：按需修改下方 server_name / root / fastcgi_pass，
#      把整个 server 块放进 nginx 的 conf.d 或 sites-enabled 目录。
#   B. 宝塔 / 已有站点：只把【伪静态核心】那一段（location /）
#      复制到面板「伪静态」框即可，PHP 解析交给面板既有配置，
#      切勿重复粘贴 location ~ \.php$（会与面板配置冲突）。
# ============================================================

server {
    listen       80;
    server_name  your-domain.com;          # 改成你的域名或服务器 IP

    # root 必须指向 public/，使 core、config、app、bootstrap.php 等
    # 源码处于 Web 根目录之外、无法被直接访问（与 index.php 的安全设计一致）。
    root   /path/to/Beautiful-Report-Card/public;
    index  index.php;

    charset utf-8;

    # —— 伪静态核心（对应 .htaccess）————————————————————————
    # 真实存在的文件或目录直接返回；其余请求一律改写到 index.php。
    # 结尾的 $is_args$args 用于把原始查询串（?a=b）一并带给入口。
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }
    # ————————————————————————————————————————————————————————

    # 把 .php 交给 PHP-FPM 执行
    location ~ \.php$ {
        try_files     $uri =404;                    # 不存在的脚本不交给 FPM，避免被利用
        fastcgi_pass  127.0.0.1:9000;               # PHP-FPM 地址；socket 形式如 unix:/run/php/php-fpm.sock
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include       fastcgi_params;
    }

    # 静态资源设较长缓存，并关闭其访问日志，减轻服务器压力
    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires    30d;
        access_log off;
    }

    # 禁止访问 .htaccess / .htpasswd 等点文件，以及本配置文件本身
    location ~ /\.ht {
        deny all;
    }
    location = /nginx.conf {
        deny all;
    }
}
